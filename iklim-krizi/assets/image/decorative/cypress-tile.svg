<svg xmlns="http://www.w3.org/2000/svg" width="960" height="480" viewBox="0 0 960 480">
  <!-- gövde: toplam yüksekliğin 1/3'ü çıplak gövde, 2/3'ü yapraklı -->
  <rect x="315" y="0" width="330" height="480" fill="#7a5738" />
  <path d="M315,0 L315,480 M645,0 L645,480" stroke="#3d2a1a" stroke-width="10" />
  <path d="M355,0 L355,480" stroke="#8f6a45" stroke-width="16" opacity="0.6" />

  <!-- sol yaprak kümesi (üstte) -->
  <circle cx="315" cy="85" r="80" fill="#3d8a42" stroke="#173420" stroke-width="14" />
  <circle cx="292" cy="65" r="40" fill="#4ea154" opacity="0.6" />

  <!-- sağ yaprak kümesi (altta) -->
  <circle cx="645" cy="240" r="80" fill="#357939" stroke="#173420" stroke-width="14" />
  <circle cx="668" cy="220" r="40" fill="#4a9750" opacity="0.5" />

  <!-- çıplak gövde bandı: y=320-480 (1/3), üstte hiç yaprak yok -->
</svg>
